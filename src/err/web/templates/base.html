<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ERR{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-logo">ERR</a>
    <span class="site-tagline">Embedded Research Runtime</span>
  </header>
  <main class="site-main">
    {% block content %}{% endblock %}
  </main>
  {% if dev_mode %}
  <script>
    (function () {
      const es = new EventSource("/dev/livereload");
      es.addEventListener("reload", () => location.reload());
      es.onerror = () => {
        es.close();
        // サーバー再起動後に再接続を試みてリロード
        const retry = setInterval(() => {
          fetch("/dev/livereload", { method: "HEAD" })
            .then(() => { clearInterval(retry); location.reload(); })
            .catch(() => {});
        }, 500);
      };
    })();
  </script>
  {% endif %}
</body>
</html>
